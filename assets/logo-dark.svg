        56%,100% { transform: translateX(0); opacity: 1; }
      }
      .word { animation: fadeWord 2.8s ease-in-out forwards; }
      @keyframes fadeWord {
        0%,20% { opacity: 0.35; }
        45%,100% { opacity: 1; }
